services:
  - type: web
    name: kairo-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: Dockerfile.prod
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: APP_NAME
        value: Kairo
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false  # Renderがデプロイ後に自動割り当てするURL

      # Database（Supabase）
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        sync: false  # Supabase の Connection string (Transaction mode) を設定

      # Cache / Session / Queue（Upstash Redis または database）
      - key: CACHE_STORE
        value: database
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: database

      # Scout（データベースドライバーを使用）
      - key: SCOUT_DRIVER
        value: database

      # ファイルストレージ（Supabase Storage）
      - key: FILESYSTEM_DISK
        value: s3
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_DEFAULT_REGION
        value: ap-southeast-1
      - key: AWS_BUCKET
        sync: false
      - key: AWS_URL
        sync: false  # Supabase Storage の公開URL
      - key: AWS_ENDPOINT
        sync: false  # https://<project>.supabase.co/storage/v1/s3

      # CORS
      - key: CORS_ALLOWED_ORIGINS
        sync: false  # Vercel のデプロイURL（例: https://kairo.vercel.app）

      # Sanctum
      - key: SANCTUM_STATEFUL_DOMAINS
        sync: false  # Vercel のドメイン（例: kairo.vercel.app）

      # Mail（ポートフォリオ用のためログ出力）
      - key: MAIL_MAILER
        value: log
