name: E2E Tests

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'テスト対象のフロントエンドURL'
        required: false
        default: 'https://kairo-red.vercel.app'
      api_base_url:
        description: 'バックエンドAPIのURL'
        required: false
        default: 'https://kairo-iphu.onrender.com'

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 依存関係インストール
        working-directory: frontend
        run: npm ci

      - name: Playwright ブラウザインストール
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: バックエンドの起動待機
        # Render の free tier は一定時間後にスリープするため、事前に起動を待つ
        run: |
          API_URL="${{ github.event.inputs.api_base_url || 'https://kairo-iphu.onrender.com' }}"
          echo "バックエンド起動待機中: $API_URL"
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$API_URL/api/jobs?per_page=1" -H "Accept: application/json" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "バックエンドが起動しました (試行 $i 回目)"
              break
            fi
            echo "待機中... ステータス: $STATUS (試行 $i / 18)"
            sleep 5
          done

      - name: E2E テスト実行
        working-directory: frontend
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'https://kairo-red.vercel.app' }}
          API_BASE_URL: ${{ github.event.inputs.api_base_url || 'https://kairo-iphu.onrender.com' }}
        run: npx playwright test

      - name: HTML レポートをアーティファクトにアップロード
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: frontend/playwright-report/
          retention-days: 30

      - name: JUnit XML レポートをアーティファクトにアップロード
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-junit-${{ github.run_id }}
          path: frontend/playwright-report/results.xml
          retention-days: 30

      - name: テスト結果サマリーを表示
        if: always()
        run: |
          if [ -f frontend/playwright-report/results.xml ]; then
            echo "## E2E テスト結果" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            # JUnit XML からテスト数をパース
            TESTS=$(grep -oP 'tests="\K[^"]+' frontend/playwright-report/results.xml | head -1 || echo "N/A")
            FAILURES=$(grep -oP 'failures="\K[^"]+' frontend/playwright-report/results.xml | head -1 || echo "N/A")
            ERRORS=$(grep -oP 'errors="\K[^"]+' frontend/playwright-report/results.xml | head -1 || echo "N/A")
            echo "| 項目 | 値 |" >> $GITHUB_STEP_SUMMARY
            echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
            echo "| テスト総数 | $TESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| 失敗 | $FAILURES |" >> $GITHUB_STEP_SUMMARY
            echo "| エラー | $ERRORS |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "HTMLレポートはアーティファクト \`playwright-report-${{ github.run_id }}\` からダウンロードできます。" >> $GITHUB_STEP_SUMMARY
          fi
