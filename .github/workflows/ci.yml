name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

jobs:
  # ============================================================
  # 変更検知（パスフィルター）
  # バックエンド / フロントエンドの変更を検知してジョブをスキップ
  # ============================================================
  changes:
    name: 変更検知
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'docs/api/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'

  # ============================================================
  # バックエンド
  # 静的解析 → テスト → OpenAPI生成・差分チェック → フロント型チェック
  # バック変更時 or main への push 時に実行
  # ============================================================
  backend:
    name: Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: matching_db_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: PHP セットアップ
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo, pdo_pgsql, pgsql, mbstring, xml, curl
          coverage: none

      - name: Composer 依存関係インストール
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: .env 生成
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate

      # 静的解析
      - name: 静的解析（Larastan）
        working-directory: backend
        run: ./vendor/bin/phpstan analyse --no-progress

      # テスト
      - name: テスト実行（Pest）
        working-directory: backend
        run: ./vendor/bin/pest --no-coverage

      # OpenAPI 生成
      - name: OpenAPI 仕様書生成
        working-directory: backend
        run: php artisan l5-swagger:generate

      - name: 生成ファイルを docs/api/ にコピー
        run: cp backend/storage/api-docs/api-docs.json docs/api/openapi.json

      # PR では差分があれば CI を落とす（開発者に再生成を促す）
      - name: API差分チェック（PR）
        if: github.event_name == 'pull_request'
        run: |
          if ! git diff --exit-code docs/api/openapi.json; then
            echo ""
            echo "❌ API仕様書（docs/api/openapi.json）が最新ではありません。"
            echo ""
            echo "以下の手順で更新してからコミットしてください："
            echo "  1. docker compose exec backend php artisan l5-swagger:generate"
            echo "  2. cp backend/storage/api-docs/api-docs.json docs/api/openapi.json"
            echo "  3. git add docs/api/openapi.json && git commit"
            echo ""
            exit 1
          fi
          echo "✅ API仕様書は最新です"

      # push では差分があれば自動コミット
      - name: 更新された仕様書をコミット（push）
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/api/openapi.json
          if git diff --staged --quiet; then
            echo "✅ openapi.json に変更なし"
          else
            git commit -m "chore: OpenAPI仕様書を自動更新 [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
          fi

      # バックの変更でフロントの型が壊れていないか確認
      - name: Node.js セットアップ（型チェック用）
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: フロント依存関係インストール
        working-directory: frontend
        run: npm ci

      - name: フロントの型を再生成
        working-directory: frontend
        run: npm run gen:types

      - name: フロントの型チェック
        working-directory: frontend
        run: npm run type-check

  # ============================================================
  # フロントエンド
  # 型チェック → Lint
  # フロント変更時 or main への push 時に実行
  # ============================================================
  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 依存関係インストール
        working-directory: frontend
        run: npm ci

      - name: 型チェック
        working-directory: frontend
        run: npm run type-check

      - name: Lint チェック
        working-directory: frontend
        run: npm run lint

  # ============================================================
  # GitHub Pages デプロイ（main への push のみ）
  # Backend / Frontend どちらか成功 or スキップならデプロイ実行
  # ============================================================
  deploy:
    name: GitHub Pages デプロイ
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (needs.backend.result == 'success' || needs.backend.result == 'skipped') &&
      (needs.frontend.result == 'success' || needs.frontend.result == 'skipped')

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: GitHub Pages セットアップ
        uses: actions/configure-pages@v4

      - name: docs/api をアーティファクトにアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/api

      - name: GitHub Pages にデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
